name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same branch / PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# This workflow only builds, vets and tests; it needs no write access.
permissions:
  contents: read

jobs:
  check:
    name: fmt, vet, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test (race detector)
        # The tests build local file:// git repositories, so a `git` on PATH is
        # the only runtime dependency (ubuntu-latest ships one).
        run: go test -race ./...
